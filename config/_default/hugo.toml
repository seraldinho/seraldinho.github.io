baseURL = 'https://seraldinho.github.io/'
languageCode = "es"
defaultContentLanguage = "es"
theme = 'blowfish'
publishDir = "public"
enableRobotsTXT = true
enableEmoji = true

[imaging]
  anchor = 'Center'


[markup.goldmark.renderer]
  unsafe = true

[pagination]
    pagerSize = 12

[outputs]
    home = ["HTML", "RSS", "JSON"]

[related]
    threshold = 0
    toLower = false

    [[related.indices]]
        name = "tags"
        weight = 100

    [[related.indices]]
        name = "categories"
        weight = 100

    [[related.indices]]
        name = "series"
        weight = 50

    [[related.indices]]
        name = "authors"
        weight = 20

    [[related.indices]]
        name = "date"
        weight = 10

    [[related.indices]]
        applyFilter = false
        name = 'fragmentrefs'
        type = 'fragments'
        weight = 10

[taxonomies]
series = "series"
